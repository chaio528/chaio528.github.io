<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>變更預訂/取消預訂</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        .reservation-change-container {
            padding-top: 10px;
        }

        .main-title {
            font-weight: bold;
        }

        .room-item {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            border: 1px solid #bfbfbf;
            border-radius: 10px;
            padding: 20px 20px;
        }

        .room-item-pic img {
            width: 100%;
            border-radius: 10px;
        }

        .room-item-title {
            font-weight: bold;
            font-size: large;
            display: -webkit-box;
            text-overflow: ellipsis;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .subtitle {
            font-weight: bold;
            margin-top: 30px;
        }

        /* 預訂詳情---------- */
        .reservation-date-gp,
        .reservation-traveler-gp {
            margin: 10px 0;
        }

        .reservation-date-title,
        .reservation-traveler-title,
        .change-btn {
            font-weight: bold;
        }

        /* 桌機-------------- */
        section {
            padding-bottom: 30px;
        }

        section+section {
            border-top: 7px solid #e0e0e0;
        }

        @media screen and (max-width:767px) {
            .desktop-gp {
                display: none;
            }

            .phone-gp .reservation-date-gp,
            .phone-gp .reservation-traveler-gp {
                display: flex;
                justify-content: space-between;
            }

            .change-btn {
                text-decoration: underline;
            }

            /* 傳送申請---------- */
            .send-request-div {
                position: sticky;
                z-index: 3;
                bottom: 0px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: #fff;
                height: 70px;
                border-top: 1px solid #d1d1d1;
                border-bottom: 1px solid #d1d1d1;
            }

            .send-request-a {
                margin-left: auto;
                text-decoration: none;
                font-weight: bold;
                color: #fff;
                background-color: #dcdcdc;
                padding: 10px 8px;
                border-radius: 10px;
            }
        }

        @media screen and (min-width:768px) {

            .send-request-div,
            .phone-gp {
                display: none;
            }

            /* 日期--- */
            .reservation-date-btn-gp,
            .reservation-traveler-btn-gp {
                width: 100%;
                border: 1px solid #bfbfbf;
            }

            .reservation-date-btn-gp .btn {
                border-right-color: #bfbfbf;
            }

            .reservation-date-btn-gp:hover,
            .reservation-traveler-btn-gp:hover,
            .reservation-date-btn-gp:focus,
            .reservation-traveler-btn-gp:focus {
                color: #bfbfbf;
            }

            .reservation-date-btn-gp span {
                color: #000;
            }

            .reservation-date-title,
            .reservation-traveler-title {
                margin-top: 30px;
            }

            /* 幾人----- */
            .reservation-traveler-btn-gp {
                border-radius: 8px;
            }

            /* .reservation-traveler-btn-gp,
            .reservation-traveler-dropdown {
                text-align: start;
            } */
        }
    </style>
</head>


<body>
    <div class="reservation-change-container container">
        <section class="reservation-change-section">
            <h1 class="main-title">你想要變更那些內容?</h1>
            <p class="main-title-describe">變更後，你可以向房東 Adagio 傳送申請，請對方確認預訂的變更內容。</p>

            <div class="room-item">
                <div class="room-item-pic">
                    <img src="change-img.jpg" class="room-img">
                </div>
                <div class="room-introduce">
                    <div class="room-item-title">
                        「全新」你所看到的一切都是新的！台中一中街乾淨明亮陽台雙人房
                    </div>
                    <div class="room-item-title-content">
                        房間．1張床．1間衛浴
                    </div>
                </div>
            </div>

            <h2 class="subtitle">預訂詳情</h2>
            <!------ 手機 ------->
            <div class="phone-gp">
                <div class="reservation-date-gp ">
                    <div class="reservation-date-sub-gp">
                        <div class="reservation-date-title">日期</div>
                        <div class="reservation-date">5月30日至31日</div>
                    </div>
                    <div class="change-btn">變更</div>
                </div>
                <div class="reservation-traveler-gp">
                    <div class="reservation-traveler-sub-gp">
                        <div class="reservation-traveler-title">旅客</div>
                        <div class="reservation-guests">1人</div>
                    </div>
                    <div class="change-btn">變更</div>
                </div>
            </div>
            <!------- 桌機------- -->
            <div class="desktop-gp">
                <!-- 日期 和 按鈕 -->
                <div class="reservation-date-title">日期</div>
                <div class="reservation-date-btn-gp btn-group" role="group">
                    <button type="button" class="reservation-date-btn btn btn-block">
                        <span>入住：2024年5月30日</span>
                    </button>
                    <button type="button" class="reservation-traveler-btn btn btn-block">
                        <span>退房：2024年5月30日</span>
                    </button>
                </div>
                <!-- 人數 和 按鈕 -->
                <div class="reservation-traveler-title">旅客</div>

                <select class="reservation-traveler-btn-gp form-select" aria-label="select">
                    <option selected>1人</option>
                    <option value="1">2人</option>
                    <option value="2">3人</option>
                    <option value="3">4人</option>
                    <option value="3">5人</option>
                    <option value="3">6人</option>
                  </select>

            </div>


        </section>
        <!------- 退訂政策 ------>
        <section class="cancellation-policy-section">
            <h2 class="subtitle">退訂政策</h2>
            <p class="cancellation-policy-p">5月29日下午3:00前可免費取消在這之後，該筆預訂則無法退款。</p>
        </section>

        <div class="send-request-div">
            <a href="#" class="send-request-a">傳送申請</a>
        </div>

    </div>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/bc13cdfd27.js" crossorigin="anonymous"></script>
</body>

</html>
