<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>變更/取消預訂</title>
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <!-- Semantic UI  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
  <!-- Compiled and minified CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    .modify-container {
      padding-top: 10px;
    }

    .main-title {
      display: flex;
      align-items: end;
      text-shadow:2px 2px 3px#9da1a0;
    }

    .main-title-img {
      width: 100%;
      vertical-align: bottom;
    }

    .modify-row {
      display: grid;
      gap: 30px;
    }

    .modify-div,
    .cancel-div {
      position: relative;
      border: 1px solid #4f9292;
      border-radius: 15px;
      padding: 15px 14px;
      box-shadow: 7px 10px 10px 3px #6f9595;
    }

    .modify-div:hover,
    .cancel-div:hover {
      border: 2px solid #4f9292;
      transform: scale(0.98);
      transition: transform 0.3s;
    }

    .ribbon {
      position: absolute;
      top: -10px;
      left: 50px;
    }

    .modify-subtitle,
    .cancel-subtitle {
      margin-top: 12px;
      font-weight: bold;
    }

    .modify-subtitle-describe,
    .cancel-subtitle-describe {
      margin-bottom: 30px;
    }

    .modify-start-div,
    .cancel-start-div {
      width: 120px;
    }

    .modify-start-div:active,
    .cancel-start-div:active {
      transform: scale(0.9);
      transition: transform 0.5s;
    }

    .modify-subtitle,
    .cancel-subtitle {
      /* text-shadow:10px 8px 2px #979797; */
      font-weight: bold;
      font-size: 28px;
    }

    a {
      text-decoration: none;
      color: #000;
    }

    @media screen and (max-width:767px) {
    }

    @media screen and (min-width:768px) {
      .modify-row {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>


<body>
  <div class="modify-container container">

    <h1 class="main-title ui header">
      <img src="../images/plugin.png" class="main-title-img">
      <div class="content">
        在Central District的1晚住宿
        <div class="main-title-describe sub header fw-bold">5月30日至5月31日入住「全新」您所看到的一切都是新的！台中一中街乾淨明亮陽台雙人房</div>
      </div>
    </h1>

    <div class="modify-row">

      <div class="modify-div">
        <div class="ui orange ribbon label">Modify Reservation</div>
        <div class="modify-icon">
          <i class="fa-solid fa-pencil fa-xl"></i>
        </div>
        <h2 class="modify-subtitle">變更預訂</h2>
        <div class="modify-subtitle-describe fw-bold">申請更改日期或房客人數</div>
        <div class="modify-start-div">
          <a class="modify-start-a ui teal button" href="https://chaio528.github.io/house/reservation-change7.html" target="_blank">
            開始吧
            <i class="fa-solid fa-angle-right fa-sm"></i>
          </a>
        </div>
      </div>

      <div class="cancel-div">
        <div class="ui orange ribbon label">Cancel Reservation</div>
        <div class="cancel-icon">
          <i class="fa-solid fa-house fa-xl"></i>
        </div>
        <h2 class="cancel-subtitle">取消預訂</h2>
        <div class="cancel-subtitle-describe fw-bold">在預訂取消之前，您會先看到所有詳情</div>
        <div class="cancel-start-div">
          <a class="cancel-start-a ui teal button" href="https://chaio528.github.io/house/cancellation8.html" target="_blank">
            開始吧
            <i class="fa-solid fa-angle-right fa-sm"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  </div>




  <!-- bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

  <!-- font awesome -->
  <script src="https://kit.fontawesome.com/bc13cdfd27.js" crossorigin="anonymous"></script>
</body>

</html>
