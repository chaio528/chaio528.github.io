<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>登入/註冊</title>
	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
	<style>
		#register-signin-ModalLabel {
			margin-top: -5px;
		}

		.modal-dialog {
			box-shadow: 30px -20px 5px #644646;
		}

		.welcome {
			margin-top: -15px;
		}

		.bline {
			border: 1px solid #bcbaba;
		}

		.signin-btn {
			position: relative;
			border: 1px solid #aaaaaa;
			display: flex;
			align-items: center;
			text-align: center;
			box-shadow: 4px 6px 5px #afa9a9;
			background-color: #00B5AD;
			border-radius: 5px;
			color: #fff;
		}

		.signin-btn:hover {
			background-color: #18a19a;
			border: 1px solid #aaaaaa;
			transform: scale(0.97);
		}

		.signin-p {
			margin-top: 20px;
		}

		.send-mail:hover {
			color: #898989;
		}

		.continue-btn {
			background-color: #f92650;
		}

		.continue-btn:hover {
			background-color: #d21f43;
		}

		.signin-icon {
			width: 40px;
			height: 40px;
		}
	</style>
</head>

<body>

	<button type="button" class="register-signin-btn btn btn-primary" data-bs-toggle="modal"
		data-bs-target="#register-signin" data-bs-whatever="@mdo">登入/註冊</button>

	<div class="register-signin-modal modal fade" id="register-signin">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<div class="register-signin-header d-flex">
						<button type="button" class="btn-close me-1" data-bs-dismiss="modal"
							aria-label="Close"></button>
						<h1 class="fs-4" id="register-signin-ModalLabel">登入或註冊</h1>
					</div>
				</div>
				<div class="modal-body">
					<form>
						<div class="register-signin-div">
							<label for="register-signin-recipient-name" class="welcome col-form-label fs-2">歡迎你</label>
							<input type="text" class="email-input form-control" id="register-signin-recipient-name"
								placeholder="電子郵件">
						</div>
						<div class="send-mail mb-3 mt-1">
							<p>我們會寄email，以確認你的電子信箱。</p>
						</div>

						<div class="continue-btn signin-btn w-100 mt-3 fw-bold fs-5 mb-4">
							<p class="col-12 signin-p">繼續</p>
						</div>

						<div class="row d-flex align-items-center justify-content-center">
							<div class="bline col-5"></div>
							<span class="col-1 text-center or">或</span>
							<div class="bline col-5"></div>
						</div>
					</form>
					<div class="facebook-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<img src="facebook.png" alt="" class="facebook-img signin-icon">
						<p class="col-10 signin-p">使用Facebook登入</p>
					</div>
					<div class="google-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<img src="google.png" alt="" class="google-img signin-icon">
						<p class="col-10 signin-p">使用Google登入</p>
					</div>
					<div class="line-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<img src="line.png" alt="" class="line-img signin-icon">
						<p class="col-9 signin-p">使用Line登入</p>
					</div>
					<div class="mail-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<img src="mail.png" alt="" class="mail-img signin-icon">
						<p class="col-9 signin-p">使用Mail登入</p>
					</div>
				</div>
			</div>
		</div>
	</div>




	<!-- bootstrap -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
		crossorigin="anonymous"></script>
	<!-- fontawesome -->
	<script src="https://kit.fontawesome.com/bc13cdfd27.js"></script>


	<script>
		const exampleModal = document.getElementById('exampleModal')
		if (exampleModal) {
			exampleModal.addEventListener('show.bs.modal', event => {
				// Button that triggered the modal
				const button = event.relatedTarget
				// Extract info from data-bs-* attributes
				const recipient = button.getAttribute('data-bs-whatever')
				// If necessary, you could initiate an Ajax request here
				// and then do the updating in a callback.

				// Update the modal's content.
				const modalTitle = exampleModal.querySelector('.modal-title')
				const modalBodyInput = exampleModal.querySelector('.modal-body input')

				modalTitle.textContent = `New message to ${recipient}`
				modalBodyInput.value = recipient
			})
		}
		//--------------------------------------------------
		window.onload = function () {
			var openModalButton = document.getElementById('openModalButton');
			var registerLoginModal = new bootstrap.Modal(document.getElementById('register-signin'));
			registerLoginModal.show();
		}
	</script>
</body>

</html>
