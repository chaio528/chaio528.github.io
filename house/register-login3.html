<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Bootstrap demo</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
	<style>
		#exampleModalLabel {
			margin-top: -5px;
		}

		.line {
			border: 1px solid #bcbaba;
		}

		.signin-btn {
			border: 1px solid #aaaaaa;
			display: flex;
			align-items: center;
			text-align: center;
			border-radius: 10px;
		}

		.signin-btn .fa {
			display: flex;
			align-items: center;
		}

		.signin-p {
			margin-top: 20px;
		}

		.btn-close:focus {
			outline:none;
			box-shadow: none;
		}

		.signin-btn:active,.btn-danger:active{
			transform: scale(0.9);
		}
		.btn-danger{
			padding: 15px 0px;
			border-radius: 10px;
		}
	</style>
</head>

<body>

	<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#register-signin"
		data-bs-whatever="@mdo">登入/註冊</button>

	<div class="modal fade" id="register-signin">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<div class="register-signin-header d-flex">
						<button type="button" class="btn-close me-1" data-bs-dismiss="modal"
							aria-label="Close"></button>
						<h1 class="fs-4" id="exampleModalLabel">登入或註冊</h1>
					</div>
				</div>
				<div class="modal-body">
					<form>
						<div class="">
							<label for="register-signin-recipient-name" class="col-form-label fs-1">歡迎你</label>
							<input type="text" class="form-control" id="register-signin-recipient-name"
								placeholder="電子郵件">
						</div>
						<div class="mb-3 mt-1">
							<p>我們會寄email，以確認你的電子信箱。</p>
							<!-- <textarea class="form-control" id="message-text"></textarea> -->
						</div>
						<button type="button" class="btn btn-danger w-100 mb-4 fs-5">繼續</button>
						<div class="row d-flex align-items-center justify-content-center">
							<div class="line col-5"></div>
							<span class="col-1 text-center or">或</span>
							<div class="line col-5"></div>
						</div>
					</form>
					<div class="facebook-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<i class="fa-brands fa-facebook fa-2xl"></i>
						<p class="col-11 signin-p">使用Facebook登入</p>
					</div>
					<div class="google-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<i class="fa-brands fa-google fa-2xl"></i>
						<p class="col-11 signin-p">使用Google登入</p>
					</div>
					<div class="line-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<i class="fa-brands fa-line fa-2xl"></i>
						<p class="col-11 signin-p">使用Line登入</p>
					</div>
					<div class="mail-signin-btn signin-btn w-100 mt-3 px-5 lh-lg fw-bold d-flex">
						<i class="fa-solid fa-envelope fa-2xl"></i>
						<p class="col-11 signin-p">使用Mail登入</p>
					</div>
				</div>
				<!-- <div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
					<button type="button" class="btn btn-primary">Send message</button>
				</div> -->
			</div>
		</div>
	</div>





	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
		crossorigin="anonymous"></script>
	<!-- fontawesome -->
	<script src="https://kit.fontawesome.com/bc13cdfd27.js"></script>

	<script>
		const exampleModal = document.getElementById('exampleModal')
		if (exampleModal) {
			exampleModal.addEventListener('show.bs.modal', event => {
				// Button that triggered the modal
				const button = event.relatedTarget
				// Extract info from data-bs-* attributes
				const recipient = button.getAttribute('data-bs-whatever')
				// If necessary, you could initiate an Ajax request here
				// and then do the updating in a callback.

				// Update the modal's content.
				const modalTitle = exampleModal.querySelector('.modal-title')
				const modalBodyInput = exampleModal.querySelector('.modal-body input')

				modalTitle.textContent = `New message to ${recipient}`
				modalBodyInput.value = recipient
			})
		}
		//--------------------------------------------------
		window.onload = function () {
			var openModalButton = document.getElementById('openModalButton');
			var registerLoginModal = new bootstrap.Modal(document.getElementById('register-signin'));
			registerLoginModal.show();
		}
	</script>
</body>

</html>
