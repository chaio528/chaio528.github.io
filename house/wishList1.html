    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        .room-row {
            margin: auto;
        }

        .room-item {
            margin-bottom: 15px;
        }


        .room-pic {
            position: relative;
            margin-bottom: 20px;
        }

        .room-img {
            width: 100%;
            border-radius: 25px;
            vertical-align: bottom;
            border: 10px solid #fbf9f9;
            box-shadow: 0px 0px 5px 5px #d0d0d0;
        }

        a {
            text-decoration: none;
            color: #000;
        }

        .room-link:hover .close-button {
            display: block;
            opacity: 0.6;
        }

        .close-button:hover {
            opacity: 1;
            background-color: #fff;
            scale: 1.1;
        }

        .close-button {
            display: none;
            position: absolute;
            top: 15px;
            left: 20px;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 10px;
            border: 0 solid #fff;
            z-index: 1;
        }

        .add-edit-div,.add-complete-div {
            width: 60px;
            margin-left: auto;
            margin-right: 10px;
        }

        .add-edit,.add-complete {
            font-size: 20px;
            border: transparent;
            background-color: transparent;
            text-decoration: underline;
            font-weight: bold;
            border-radius: 10px;
            padding: 5px 8px;
            text-align: center;
            margin-top: 10px;
        }

        .add-edit:hover,.add-complete:hover {
            background-color: #e1e1e1;
        }

        .main-wish-title,
        .subtitle,
        .saved {
            color: black;
        }

        .main-wish-title {
            padding-left: 25px;
            font-weight: bold;
        }

        .subtitle {
            font-weight: bold;
            font-size: 18px;
            display: -webkit-box;
            text-overflow: ellipsis;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .saved {
            margin-top: -8px;
            font-size: 14px;
            color: #777070;
        }
        /* Swiper 照片幻燈片--------------------- */
        .swiper {
            width: 100%;
            height: 100%;
            border-radius: 25px;
        }

        .swiper-slide {
            text-align: center;
            font-size: 18px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        :root {
            --swiper-theme-color: #ededed;
        }

        @media screen and (min-width:768px) {
            .add-edit-div,.add-complete-div{
                display: none;
            }
            .wish-list-container{
                max-width: 1200px;
            }
            .add-edit:active {
                background-color: transparent;
            }
        }
    </style>
