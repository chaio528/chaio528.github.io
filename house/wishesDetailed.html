<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        .room-row {}

        * {
            color: #000;
        }

        .room-icon {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .room-icon img{
            margin-top: 10px;
        }

        .room-icon-right img {
            margin: 5px;
            margin-top: 10px;
        }

        .date-peoples {
            display: grid;
            grid-template-columns: auto auto;
            justify-content: start;
            gap: 10px;
            margin: 15px 0;
        }

        .date-peoples button {
            background-color: #fff;
            border: 1px solid #bebdbd;
            border-radius: 20px;
            padding: 6px 12px;
            width: fit-content;
        }
        .date-peoples button:hover{
            border:  1px solid #000;
        }

        .room-item {
            margin-bottom: 45px;

        }

        .card-pic {
            margin-bottom: 10px;
            /* outline: 2px solid red; */
            position: relative;
            height: 100%;
            background: #fff;
            font-family: Helvetica, Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #000;
            margin: 0;
            padding: 0;
        }

        .room-img {
            width: 100%;
            border-radius: 25px;
            vertical-align: bottom;
        }

        .room-introduce {
            margin: 10px 0px;
        }

        .room-title {}

        .room-detail {
            margin-top: -4px;
        }

        .price {
            font-weight: bold;
            margin: 2px 0px;
        }

        .total {
            text-decoration: underline;
            font-weight: 400;
        }

        .room-link {
            text-decoration: none;
        }

        .remark {
            text-decoration: underline;
        }

        .main-title,
        .subtitle {
            color: black;
        }

        .main-title {
            font-weight: bold;
            margin: 10px 0px;
        }

        .subtitle {
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
        }


        /* Swiper */
        .swiper {
            width: 100%;
            height: 100%;
            border-radius: 25px;
            /* margin-bottom: 10px ; */
        }

        .swiper-slide {
            text-align: center;
            font-size: 18px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        :root {
            --swiper-theme-color: #ededed;
        }

        /*  */
    </style>
</head>

<body>
    <div class="container">
        <div class="room-icon">
            <img src="left-solid.svg" alt="">
            <div class="room-icon-right">

        <h1 class="main-title">用戶自訂名字</h1>

        <div class="room-row row">

                    <a href="#" class="room-link">

                                <div class="swiper-wrapper">

                                    </div>

                                    </div>
                                    <div class="swiper-slide">

                                    </div>
                                </div>
                                <div class="swiper-pagination"></div>
                            </div>
                        </div>
                        <div class="room-introduce">
                            <div class="room-title">
                                <h2 class="subtitle">位於Hualien City的獨立房間
                                    <span class="star">★ 4.84(323)</span>
                                </h2>
                            </div>
                            <div class="room-detail">

                                    <span class="total">總計$16,854 TWD</span>
                                </span>
                            </div>
                        </div>
                    </a>
                    <div class="remark">新增備註</div>

            </div>
            <div class="col-12 col-sm-12 col-md-4">
                <div class="room-item">

                        <div class="card-pic">
                            <div class="swiper mySwiper">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide">
                                        <img src="house.jpg" class="room-img">
                                    </div>
                                    <div class="swiper-slide">

                                    <div class="swiper-slide">

                                    </div>
                                </div>
                                <div class="swiper-pagination"></div>
                            </div>
                        </div>
                        <h2 class="subtitle">位於Hualien City的獨立房間</h2>
                    </a>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-md-4">
                <div class="room-item">
                    <a href="#" class="room-link">
                        <div class="card-pic">
                            <div class="swiper mySwiper">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide">

        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
        var swiper = new Swiper(".mySwiper", {

</body>

</html>
