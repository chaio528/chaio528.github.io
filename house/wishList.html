    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="grid.css">
    <style>
        .room-row {
            margin: auto;
        }

        .room-item {
            margin-bottom: 15px;
        }


        .card-pic {
            position: relative;
            margin-bottom: 20px;
        }

        .room-img {
            width: 100%;
            border-radius: 25px;
            border: 5px solid #fbf9f9;
            vertical-align: bottom;
            box-shadow: 0px 0px 5px 2px #d0d0d0;
        }

        .room-link {
            text-decoration: none;
        }

        .room-link:hover .close-button {
            display: block;
            opacity: 0.6;
        }

        .close-button:hover {
            opacity: 1;
            background-color: #fff;
            scale: 1.1;
        }

        .close-button {
            display: none;
            position: absolute;
            top: 12px;
            left: 15px;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 10px;
            border: 0 solid #fff;
        }

        .add-edit-div {
            width: 60px;
            margin-left: auto;
            margin-right: 10px;
        }

        .add-edit {
            border: transparent;
            background-color: transparent;
            text-decoration: underline;
            font-weight: bold;

            border-radius: 10px;
            padding: 3px 0px;
            text-align: center;
            margin-top: 10px;
        }

        .add-edit:active {
            background-color: #e1e1e1;
        }

        .main-wish-title,
        .subtitle,
        .saved {
            color: black;
        }

        .main-wish-title {
            padding-left: 25px;
            font-weight: bold;
        }

        .subtitle {
            font-weight: bold;
            font-size: 18px;
            display: -webkit-box;
            text-overflow: ellipsis;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .saved {
            margin-top: -8px;
            font-size: 14px;
            color: #777070;
        }

        @media screen and (min-width:768px) {
            .wish-list-container{
                max-width: 1200px;
                margin: auto;
            }
            .add-edit:active {
                background-color: transparent;
            }
        }
    </style>
</head>
