<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    




    <div class="container">
        <div class="divItem d-flex p-lg-3 mb-2 mt-2 border border-secondary-subtle">
            <!-- 我是內層div -->
            <div class="divTodo bg-primary-subtle d-flex align-items-center p-2">
                <!-- 我是勾選欄 -->
                <input class="check form-check-input me-1 border border-secondary-subtle m-3" type="checkbox">
                <!-- 我是輸入欄 -->
                <input type="text" class="inputTodo myInput form-control bg-primary-subtle ms-2 flex-wrap">
            </div>
            <!-- 編輯 刪除 -->
            <div class="divBtn mx-auto">
                <button type="button" class="editBtn btn btn-warning mx-1">編輯</button>
                <button type="button" class="delBtn btn btn-danger">刪除</button>
            </div>
        </div>











</body>
</html>
