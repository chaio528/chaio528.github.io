<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>變更/取消預訂</title>
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    .modify-container{
      padding-top: 10px;
    }
    .modify-div,
    .cancel-div {
      border: 1px solid #bfbfbf;
      border-radius: 15px;
      padding: 20px 20px;
    }

    .modify-subtitle,
    .cancel-subtitle {
      padding-top: 10px;
      font-weight: bold;
    }

    .modify-subtitle-describe,
    .cancel-subtitle-describe {
      margin-bottom: 30px;
    }

    .modify-start-a,
    .cancel-start-a {
      font-weight: bold;
      border: 1px solid #000;
      border-radius: 15px;
      padding: 10px 10px;
    }

    .modify-start-div,
    .cancel-start-div {
      width: 120px;
    }

    .modify-start-div:active,
    .cancel-start-div:active {
      transform: scale(0.9);
      transition: transform 0.5s;
    }

    a {
      text-decoration: none;
      color: #000;
    }

    @media screen and (max-width:767px) {
      .modify-row {
        display: grid;
        gap: 30px;
      }
    }

    @media screen and (min-width:768px) {
      .modify-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
  </style>
</head>


<body>
  <div class="modify-container container">
    <h1 class="main-title">在Central District的1晚住宿</h1>
    <p class="main-title-describe">5月30日至5月31日入住「全新」您所看到的一切都是新的！台中一中街乾淨明亮陽台雙人房</p>

    <div class="modify-row">

      <div class="modify-div">
        <div class="modify-icon">
          <i class="fa-solid fa-pencil fa-xl"></i>
        </div>
        <h2 class="modify-subtitle">變更預訂</h2>
        <div class="modify-subtitle-describe">申請更改日期或房客人數</div>
        <div class="modify-start-div">
          <a href="#" class="modify-start-a">
            開始吧
            <i class="fa-solid fa-angle-right fa-sm"></i>
          </a>
        </div>
      </div>

      <div class="cancel-div">
        <div class="cancel-icon">
          <i class="fa-solid fa-house fa-xl"></i>
        </div>
        <h2 class="cancel-subtitle">取消預訂</h2>
        <div class="cancel-subtitle-describe">在預訂取消之前，您會先看到所有詳情</div>
        <div class="cancel-start-div">
          <a href="#" class="cancel-start-a">
            開始吧
            <i class="fa-solid fa-angle-right fa-sm"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  </div>




  <!-- bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

  <!-- font awesome -->
  <script src="https://kit.fontawesome.com/bc13cdfd27.js" crossorigin="anonymous"></script>
</body>

</html>
