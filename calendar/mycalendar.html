<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>行事曆Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"

    <style>
        .container {
            box-shadow: 0px 0px 15px rgb(154, 151, 132);
        }

        .weekday-area>* {
            height: 40px;
            line-height: 40px;
            text-align: center;
        }

        .date-area>* {
            height: 100px;
            cursor: pointer;
            overflow: hidden;
        }

        .row-cols-7>* {
            flex: 0 0 auto;
            width: 14.2857143%;
        }

        .header {
            background-color: #fac2d5;
        }

        .weekday-area {
            font-weight: bold;
            color:#355d49;
            background-color: #FFCCCC;
        }

        .weekday-area :first-child,
        .weekday-area :last-child {
            background-color: #b4e7eb;
        }

        .date-title {
            font-weight: bold;
            color: #36bda7;
            text-shadow: 2px -2px 2px#1cfdd6;
        }

        .btns {
            color: aliceblue;
            font-weight: bold;
            padding: 10px 5px;
            margin: 2px;
            box-shadow: 6px 3px 12px gold;

        }

        .btns:active {
            box-shadow: 1px 1px 2px gold;
        }

        .bottomGroup {
            display: flex;
            justify-content: space-between;
            /* align-items:baseline; */
        }

        .year {
            font-family:Impact,'Arial Narrow Bold', sans-serif;
            color: #fff;
            margin-right: 10px;
            font-size: 38px;
            text-shadow: 2px 2px 2px #20a3c7;
        }

        .addBtn {
            height: 40px;
            margin-left: 10px;
            background-color: #f8dab4;
            box-shadow: 6px 3px 12px gold;
            color: azure;
        }

        .addBtn:hover {
            box-shadow: 1px 1px 2px gold;
            background-color: #f8dab4;
            color: azure;
        }

        li {
            list-style-image: url(icon.png);
        }
    </style>
</head>

<body>
    <div class="container mt-3 rounded-1">
        <!-- 標題 -->
        <header class="my-1 text-center rounded-1 header">
            <!-- bg-danger-subtle -->
            <div class="title">
                <h1 class="date-title">月份</h1>

            </div>
            <button type="button" class="btn btn-warning rounded-start-circle last-month-btn btns">
                <<</button>
                    <button type="button" class="btn btn-warning rounded-circle today-btn btns">Today</button>
                    <button type="button" class="btn btn-warning rounded-end-circle next-month-btn btns">>></button>
                    <div class="bottomGroup">
                        <button type="button" class="btn addBtn" data-bs-toggle="modal"
                            data-bs-target="#create_todo_modal">
                            ✚
                        </button>
                        <span class="year">2024</span>
                    </div>
        </header>

        <section class="calendar-area">
            <!-- 星期日~星期六 -->
            <div class="row row-cols-7 weekday-area g-0">
                <div class="border col ">Sunday</div>
                <div class="border col ">Monday</div>
                <div class="border col ">Tuesday</div>
                <div class="border col ">Wednesday</div>
                <div class="border col ">Thursday</div>
                <div class="border col ">Friday</div>
                <div class="border col ">Saturday</div>
            </div>
            <!-- 不含星期幾橫列的 每日Body大面積 -->
            <div class="row row-cols-7 date-area g-0">
                <div class="border col">
                    <!-- 當月1號 -->
                    <span class="d-inline-block text-center w-100">1</span>
                </div>
                <div class="border col">
                    <!-- 下個月1號 -->
                    <span>1</span>
                    <ul>
                        <li>todo1</li>
                        <li>todo2</li>
                    </ul>
                </div>
                <!-- 每一天的日期小格子 -->

          <div class="border col"></div>

            </div>
        </section>
    </div>



    <!-- 創造 跳出行程模型 Create Modal -->
    <div class="modal fade" id="create_todo_modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">

        <div class="modal-dialog">
            <div class="modal-content bg-info-subtle">
                <div class="modal-header">
                    <!-- 標題  新增行程 -->
                    <h5 class="modal-title bg-info w-100 text-center rounded-4" id="staticBackdropLabel">新增行程</h5>
                    <!-- 叉叉按鈕 -->
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <!-- 日期  小標籤 -->
                        <label for="date_input" class="form-label">日期</label>
                        <!-- 選擇日期 -->
                        <input type="date" class="form-control" id="date_input" aria-describedby="datetimeHelp" />
                        <!-- <div>顯示對用戶的指示   請選擇日期. -->
                        <div id="datetimeHelp" class="form-text">請選擇日期.</div>
                    </div>
                    <div class="mb-3">
                        <!-- 代辦事項  小標籤 -->
                        <label for="todo_item_input" class="form-label">待辦事項</label>
                        <!-- 輸入內容區 -->
                        <textarea class="form-control" id="todo_item_input"></textarea>
                    </div>
                </div>
                <!-- 跳出模型的尾部 -->
                <div class="modal-footer">
                    <!-- 取消按鈕 -->
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        取消
                    </button>
                    <!-- 新增按鈕 -->
                    <button type="button" class="btn btn-primary" onclick="createTodo()">
                        新增
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 按下行程 跳出 編輯模型 -->
    <!-- Update Modal -->
    <div class="modal fade" id="update_todo_modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel2" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-success-subtle">
                <!-- 標題  編輯行程 -->
                <div class="modal-header">
                    <h5 class="modal-title bg-success text-white w-100 text-center rounded-4" id="staticBackdropLabel2">
                        編輯行程</h5>
                    <!-- 叉叉按鈕 -->
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <!-- 內容區 -->
                <div class="modal-body">
                    <div class="mb-3">
                        <!-- 日期  小標籤 -->
                        <label for="date_input" class="form-label">日期</label>
                        <!-- 選擇日期 -->
                        <input type="date" class="form-control" id="date_update_input" aria-describedby="datetimeHelp2"
                            disabled />
                    </div>
                    <div class="mb-3">
                        <!-- 待辦事項  小標籤 -->
                        <label for="todo_item_update_input" class="form-label">待辦事項</label>
                        <!-- 輸入內容區 -->
                        <textarea class="form-control" id="todo_item_update_input"></textarea>
                    </div>
                </div>
                <!-- 下方按鈕區 -->
                <div class="modal-footer">
                    <!-- 更新按鈕 -->
                    <button type="button" class="btn btn-success update-btn">更新</button>
                    <!-- 刪除按鈕 -->
                    <button type="button" class="btn btn-danger delete-btn">刪除</button>
                    <!-- 取消按鈕 -->
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <script src="./main1.js"></script>
</body>

</html>
